<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
    <label for="mobileInput">휴대폰 번호</label>
    <input 
    id="mobileInput"
    type= "text" 
    placeholder="010-1234-5678"
    pattern="010-[0-9]{4}-[0-9]{4}" 
    title="010-1234-5678 형식으로 입력하세요"
    required
    >
<!-- 휴대폰 번호 패턴 부여하기 title로 오류 메세지 변경  -->
<!-- [0-9]{4} 0~9까지의 숫자를 4자리 허용한다 -->
 <!-- required 빈 값일 때도 오류 메시지 생성 -->
    <br>

    <label for="emailInput">이메일주소</label>
    <input
    id="emailInput"
    type="email" 
    placeholder="A@example.com"
    title="A@example.com의 형식으로 입력하세요"
    required
    >
    <button>입력</button>
    </form>
</body>
</html>
