<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h5>구매 가능한 과일</h5>
    <!-- unordered list -->
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
    </ul>
    <hr>

    <!-- ordered list -->
     <!-- 태그에 속성을 TYPE을 통해 부여한다 -->
     <ol type="I">
        <li>Apple</li>
        <li>Banana</li>
        <li>Cherry</li>
     </ol>
     <hr>
</body>

</html>
