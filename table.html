<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 표에는 열(columns)에오는 속성이 중요 -->
    <table border="1">
        <!-- head, 역할을 하는 row 정의 -->
<thead>
    <tr>
 <!-- 하나의 셀을 의미 -->
  <th>name</th>
  <th>age</th>
<th>email</th>    
</tr>
</thead>
<!-- 테이블 body -->
<tbody>
    <tr>
        <td>alex</td>
        <td>22</td>
        <td>alex@example.com</td>
    </tr>
    <tr>
        <td>bob</td>
        <td>25</td>
        <td>bob@example.com</td>
    </tr>
    <tr>
        <td>chris</td>
        <td>40</td>
        <td>chris@example.com</td>
    </tr>
</tbody>

    </table>
</body>
</html>
